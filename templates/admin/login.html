<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Yönetici Girişi — Onhas Yapı CMS</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Özel CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--dark-bg-alt) 50%, var(--dark-surface) 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-brand .brand-icon {
            width: 56px;
            height: 56px;
            background: var(--gold);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #1a1a2e;
            font-weight: 900;
        }
        .login-brand h3 {
            margin-top: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .login-brand p {
            color: #6c757d;
            font-size: 0.85rem;
            margin: 0;
        }
        .login-card .form-label {
            color: #b0b8c8;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }
        .login-card .form-control {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .login-card .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.2);
            color: #fff;
        }
        .login-card .form-control::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            font-weight: 700;
            font-size: 1rem;
            background: var(--gold);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            margin-top: 8px;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            background: #d4b65e;
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(201,168,76,0.3);
        }
        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
            border: none;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <!-- Logo & Başlık -->
        <div class="login-brand">
            <div class="brand-icon">&#9678;</div>
            <h3>ONHAS YAPI</h3>
            <p>Yönetici Paneli</p>
        </div>

        <!-- Flash Mesajları -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Kapat"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Giriş Formu -->
        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="mb-3">
                <label for="username" class="form-label">Kullanıcı Adı</label>
                <div class="input-group">
                    <span class="input-group-text" style="background: var(--card-bg); border: 1px solid var(--border-color); border-right: none; color: var(--gold);">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="username" id="username" class="form-control" 
                           placeholder="Kullanıcı adınızı girin" required autofocus
                           style="border-left: none;">
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Şifre</label>
                <div class="input-group">
                    <span class="input-group-text" style="background: var(--card-bg); border: 1px solid var(--border-color); border-right: none; color: var(--gold);">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" name="password" id="password" class="form-control" 
                           placeholder="Şifrenizi girin" required
                           style="border-left: none;">
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap
            </button>
        </form>

        <div class="login-footer">
            &copy; {{ now.year if now else '2025' }} Onhas Yapı CMS
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Tema Toggle -->
    <button id="themeToggleBtn" class="theme-toggle-inline" style="position:fixed;bottom:20px;right:20px;z-index:9999" title="Tema değiştir">
        <i class="bi bi-sun-fill" id="themeIcon"></i> Tema
    </button>


<script>
(function() {
    const THEME_KEY = 'onhas-theme';
    const icon = document.getElementById('themeIcon');
    function getTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }
    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem(THEME_KEY, theme);
        if (icon) icon.className = theme === 'light' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = theme === 'light' ? '#f5f0e8' : '#1a1a2e';
    }
    setTheme(getTheme());
    window.toggleTheme = function() {
        setTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    };
})();
</script>

</body>
</html>
